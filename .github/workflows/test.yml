name: テスト（CI）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Streamlit ページ起動スモーク
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python 構文チェック
        run: |
          # src/ 配下と root の py を全部チェック
          find . -name "*.py" -not -path "./.venv/*" -not -path "*/__pycache__/*" \
            | xargs python -m py_compile

      - name: AppTest による起動スモーク（ui/app.py）
        run: |
          if [ -f ui/app.py ]; then
            python -c "
          from streamlit.testing.v1 import AppTest
          at = AppTest.from_file('ui/app.py', default_timeout=30).run()
          if at.exception:
              print('❌ 起動例外あり')
              for exc in at.exception:
                  print(f'  - {getattr(exc, \"value\", exc)}')
              exit(1)
          print('✅ ui/app.py 例外なし起動')
          "
          else
            echo "ui/app.py が無いためスキップ"
          fi
        env:
          ANTHROPIC_API_KEY: dummy_for_ci
